  <rect x="28" y="25" width="12" height="18" rx="2" fill="#a8d5ba" opacity="0.8"/>
  <rect x="28" y="20" width="12" height="5" fill="#8bc34a" rx="1"/>
  <!-- Frasco 2 (rosa) -->
  <rect x="45" y="28" width="11" height="15" rx="2" fill="#f8bbd0" opacity="0.8"/>
  <circle cx="50.5" cy="23" r="3" fill="#ec407a"/>
  <!-- Espejo -->
  <circle cx="68" cy="45" r="8" fill="none" stroke="#daa520" stroke-width="2"/>
  <circle cx="68" cy="45" r="6" fill="#fff8dc" opacity="0.6"/>
  <!-- Brillo general -->
